name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Format check (ruff)
        if: ${{ !cancelled() }}
        run: uv run ruff format --check

      - name: Type check (pyright)
        if: ${{ !cancelled() }}
        run: uv run pyright

      # Secondary check: ensure the published package stays clean under mypy
      # strict, so downstream projects using mypy never see errors from our
      # py.typed sources. Pyright remains the primary type checker.
      - name: Type check (mypy)
        if: ${{ !cancelled() }}
        run: uv run mypy

      - name: Tests (pytest)
        if: ${{ !cancelled() }}
        run: uv run pytest
